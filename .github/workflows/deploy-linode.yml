name: Deploy to Linode

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: berkeleydogs-linode-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
      REMOTE_USER: ${{ secrets.REMOTE_USER }}
      REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
      REMOTE_TARGET: ${{ secrets.REMOTE_TARGET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${REMOTE_HOST:?REMOTE_HOST secret is required}"
          : "${SSH_PRIVATE_KEY:?SSH_PRIVATE_KEY secret is required}"

          REMOTE_PORT="${REMOTE_PORT:-2222}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/linode_deploy_key
          chmod 600 ~/.ssh/linode_deploy_key
          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to Linode
        run: |
          set -euo pipefail
          REMOTE_USER="${REMOTE_USER:-deploy}"
          REMOTE_PORT="${REMOTE_PORT:-2222}"
          REMOTE_TARGET="${REMOTE_TARGET:-/var/www/berkeleydogs.com}"
          SSH_CMD="ssh -i ~/.ssh/linode_deploy_key -p ${REMOTE_PORT}"

          $SSH_CMD "$REMOTE_USER@$REMOTE_HOST" "mkdir -p '$REMOTE_TARGET' && sudo chown -R '$REMOTE_USER':'$REMOTE_USER' '$REMOTE_TARGET'"

          rsync -az --delete \
            --no-owner \
            --no-group \
            --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.next/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            -e "$SSH_CMD" \
            ./ "$REMOTE_USER@$REMOTE_HOST:$REMOTE_TARGET/"

      - name: Rebuild and restart container
        run: |
          set -euo pipefail
          REMOTE_USER="${REMOTE_USER:-deploy}"
          REMOTE_PORT="${REMOTE_PORT:-2222}"
          REMOTE_TARGET="${REMOTE_TARGET:-/var/www/berkeleydogs.com}"
          SSH_CMD="ssh -i ~/.ssh/linode_deploy_key -p ${REMOTE_PORT}"

          cat > /tmp/berkeleydogs-deploy.sh <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$1"

          if docker info >/dev/null 2>&1; then
            DOCKER="docker"
          else
            DOCKER="sudo -n docker"
          fi

          $DOCKER compose -f docker-compose.prod.yml up -d --build --remove-orphans
          $DOCKER image prune -f
          $DOCKER compose -f docker-compose.prod.yml ps

          HOST_PORT="$($DOCKER compose -f docker-compose.prod.yml port berkeleydogs 3000 | awk -F: 'END {print $NF}')"
          HOST_PORT="${HOST_PORT:-3000}"
          echo "Checking local app health on 127.0.0.1:${HOST_PORT}/guide"

          if ! curl -fsS "http://127.0.0.1:${HOST_PORT}/guide" >/dev/null; then
            echo "Local app health check failed. Recent container logs:"
            $DOCKER compose -f docker-compose.prod.yml logs --tail=120 berkeleydogs
            exit 1
          fi
          REMOTE_SCRIPT

          $SSH_CMD "$REMOTE_USER@$REMOTE_HOST" "bash -s -- '$REMOTE_TARGET'" < /tmp/berkeleydogs-deploy.sh
