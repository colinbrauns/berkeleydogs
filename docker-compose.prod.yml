services:
  berkeleydogs:
    container_name: app-berkeleydogs
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
    expose:
      - "3000"
    networks:
      - proxy
      - infra_default
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  proxy:
    external: true
  infra_default:
    external: true
