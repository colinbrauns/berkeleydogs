services:
  berkeleydogs:
    container_name: app-berkeleydogs-local
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
    command: sh -c "npm install && npm run dev"



